id: hpa-scaling-thrash
prompt: |
  [Context]
  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the `bleater` namespace. You can check all available namespaces at `/home/ubuntu/.allowed_namespaces`.
  Information about the application and supporting infrastructure is available at http://gitea.devops.local/root/bleater-app/wiki.
  Passwords are stored here: http://passwords.devops.local.
  Your email is set up at devops@nebula.local and can be accessed via http://maddy.devops.local.
  For team communication, Mattermost is used at http://mattermost.devops.local.

  [Task]
  The bleater-api-gateway service is experiencing severe Horizontal Pod Autoscaler (HPA) instability.
  The HPA is rapidly scaling between minimum and maximum replicas every few minutes despite steady traffic,
  generating excessive scaling events per hour.

  This scaling thrash is causing:
  - Unnecessary pod churn and resource waste
  - Intermittent connection drops during scale-down
  - High CPU usage from constant pod startup/shutdown
  - Alert fatigue from scaling notifications

  Your task is to investigate and fix ALL the issues contributing to the HPA instability.
  The problems span multiple areas — the HPA configuration itself (stabilization windows,
  scaling policies, select policy, CPU target, replica bounds), the metrics pipeline
  (metrics-server deployment, service selector, APIService configuration), workload resource
  definitions (CPU requests/limits, LimitRange constraints), and potentially conflicting
  resources (duplicate HPAs, enforcement CronJobs, static pod enforcers, k3s auto-deploy manifests).

  An HPA has been configured for the api-gateway but is causing instability.

  The team's SRE scaling standards are documented in the Gitea wiki (SRE-Scaling-Standards page)
  and define the required production thresholds for stabilization windows, CPU targets,
  replica ranges, and scaling policies. Check the wiki, Mattermost #platform-ops channel,
  and Gitea issues for context on what happened and what the correct values should be.

  Verify the fix by ensuring:
  - The HPA is no longer thrashing — stabilization windows, scaling policies, and select policy meet SRE standards
  - Scaling behavior is stable and appropriate for production workloads — CPU target and replica range are within approved bounds
  - All corrections persist over time (are not reverted by enforcement CronJobs, static pods, or auto-deploy manifests)
  - The metrics pipeline is healthy — APIService, metrics-server service/deployment, and deployment CPU requests are all correctly configured
  - No LimitRange or other resource constraints block the required deployment resource settings

  IMPORTANT: Do NOT use any interactive commands, for example `-i` or `-it`, in `docker exec`,
  or any other TTY commands.

metadata:
  category: devops
  difficulty: hard
